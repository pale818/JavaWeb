<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmed - Online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div class="text-center my-5">
        <div class="mb-3" style="font-size:4rem;">&#10003;</div>
        <h2 class="text-success">Order Placed Successfully!</h2>
        <p class="text-muted">Order #<span th:text="${order.id}"></span></p>
    </div>

    <div class="card mb-4">
        <div class="card-header"><strong>Order Details</strong></div>
        <div class="card-body">
            <p><strong>Date:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></span></p>
            <p><strong>Payment:</strong> <span th:text="${order.paymentMethod}"></span></p>
            <p><strong>Total:</strong> €<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header"><strong>Items</strong></div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead class="table-light">
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th class="text-end">Price at Purchase</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.product.name}">Product</td>
                    <td th:text="${item.quantity}">1</td>
                    <td class="text-end" th:text="'€' + ${item.priceAtPurchase}">€0.00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex gap-2">
        <a th:href="@{/orders/my}" class="btn btn-outline-primary">View My Orders</a>
        <a th:href="@{/}" class="btn btn-primary">Continue Shopping</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
