<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart - Online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container">
        <h2 class="mb-4">Your Shopping Cart</h2>

        <div th:if="${cartItems.empty}" class="alert alert-info">
            Your cart is empty. <a href="/categories" class="alert-link">Browse products</a>.
        </div>

        <div th:if="${!cartItems.empty}">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="bg-light rounded text-center me-3" style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                                    <i class="bi bi-image text-secondary"></i>
                                </div>
                                <span th:text="${item.product.name}">Product Name</span>
                            </div>
                        </td>
                        <td th:text="'$' + ${item.product.price}">$0.00</td>
                        <td>
                            <form th:action="@{/cart/update}" method="post" class="d-flex" style="width: 120px;">
                                <input type="hidden" name="productId" th:value="${item.product.id}">
                                <input type="number" name="quantity" class="form-control form-control-sm me-2" th:value="${item.quantity}" min="0" th:max="${item.product.stockQuantity}">
                                <button type="submit" class="btn btn-sm btn-outline-secondary">Update</button>
                            </form>
                        </td>
                        <td th:text="'$' + ${item.subtotal}">$0.00</td>
                        <td>
                            <form th:action="@{/cart/remove}" method="post">
                                <input type="hidden" name="productId" th:value="${item.product.id}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" class="text-end fw-bold">Total:</td>
                        <td class="fw-bold" th:text="'$' + ${total}">$0.00</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>

            <div class="d-flex justify-content-between mt-4">
                <form th:action="@{/cart/clear}" method="post">
                    <button type="submit" class="btn btn-outline-warning">Clear Cart</button>
                </form>
                <div>
                    <a href="/categories" class="btn btn-outline-primary me-2">Continue Shopping</a>
                    <a href="/checkout" class="btn btn-success px-4">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
