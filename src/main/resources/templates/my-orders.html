<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders - Online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <h2 class="mb-4">My Orders</h2>

    <div th:if="${orders.empty}" class="alert alert-info">
        You have no orders yet. <a th:href="@{/categories}">Start shopping!</a>
    </div>

    <div th:each="order : ${orders}" class="card mb-3">
        <div class="card-header d-flex justify-content-between">
            <span>Order #<strong th:text="${order.id}"></strong></span>
            <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
        </div>
        <div class="card-body">
            <table class="table table-sm mb-2">
                <thead class="table-light">
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th class="text-end">Price</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.product.name}">Product</td>
                    <td th:text="${item.quantity}">1</td>
                    <td class="text-end" th:text="'€' + ${item.priceAtPurchase}">€0.00</td>
                </tr>
                </tbody>
            </table>
            <div class="d-flex justify-content-between">
                <span class="badge bg-secondary" th:text="${order.paymentMethod}">CASH</span>
                <strong>Total: €<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span></strong>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
