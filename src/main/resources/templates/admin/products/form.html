<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Form - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <h2 class="mb-4" th:text="${product.id != null} ? 'Edit Product' : 'New Product'">Product</h2>

    <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Price (€)</label>
                <input type="number" step="0.01" th:field="*{price}" class="form-control"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{price}"></div>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Stock Quantity</label>
                <input type="number" th:field="*{stockQuantity}" class="form-control"
                       th:classappend="${#fields.hasErrors('stockQuantity')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{stockQuantity}"></div>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Category</label>
                <select th:field="*{category}" class="form-select">
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${product.category != null and product.category.id == cat.id}">
                    </option>
                </select>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/admin/products}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
