<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${category.name} + ' - Online Shop'">Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/categories}">Categories</a></li>
            <li class="breadcrumb-item active" th:text="${category.name}">Category</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${category.name}">Category Name</h2>
        <input type="text" id="searchInput" class="form-control w-auto"
               placeholder="Search products..." style="min-width:220px"
               th:data-category-id="${category.id}">
    </div>

    <!-- AJAX results appear here -->
    <div id="searchResults" class="row row-cols-1 row-cols-md-3 g-4" style="display:none;"></div>

    <!-- Static category products -->
    <div id="staticProducts" class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                    <p class="card-text text-truncate" th:text="${product.description}">Description</p>
                    <p class="card-text fw-bold" th:text="'€' + ${product.price}">€0.00</p>
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-outline-primary">View Details</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${products.empty}" class="alert alert-info mt-4">
        No products found in this category.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const staticProducts = document.getElementById('staticProducts');

    searchInput.addEventListener('keyup', function () {
        const query = this.value.trim();
        if (query.length < 1) {
            searchResults.style.display = 'none';
            searchResults.innerHTML = '';
            staticProducts.style.display = '';
            return;
        }
        const categoryId = searchInput.dataset.categoryId;
        fetch('/api/products/search?name=' + encodeURIComponent(query) + '&categoryId=' + categoryId)
            .then(res => {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(products => {
                staticProducts.style.display = 'none';
                searchResults.style.display = '';
                if (products.length === 0) {
                    searchResults.innerHTML = '<div class="col"><p class="text-muted">No products found.</p></div>';
                    return;
                }
                searchResults.innerHTML = products.map(p => `
                    <div class="col">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${p.name}</h5>
                                <p class="card-text text-truncate">${p.description ?? ''}</p>
                                <p class="card-text fw-bold">€${p.price}</p>
                                <a href="/products/${p.id}" class="btn btn-outline-primary">View Details</a>
                            </div>
                        </div>
                    </div>`).join('');
            })
            .catch(err => console.error('Search error:', err));
    });
</script>
</body>
</html>
