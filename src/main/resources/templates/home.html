<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Online Shop - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container">
        <div class="jumbotron p-5 mb-4 bg-light rounded-3">
            <div class="container-fluid py-5">
                <h1 class="display-5 fw-bold">Welcome to Online Shop</h1>
                <p class="col-md-8 fs-4">Explore our wide range of products across various categories.</p>
                <a href="/categories" class="btn btn-primary btn-lg">Browse Categories</a>
            </div>
        </div>

        <h3>Featured Products</h3>
        <div class="row row-cols-1 row-cols-md-3 g-4 mb-5">
            <div class="col" th:each="product : ${featuredProducts}">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                        <p class="card-text text-truncate" th:text="${product.description}">Description</p>
                        <p class="card-text fw-bold" th:text="'$' + ${product.price}">$0.00</p>
                        <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-outline-primary">View Details</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
