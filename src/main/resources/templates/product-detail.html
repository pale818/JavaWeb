<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - Online Shop'">Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/categories">Categories</a></li>
                <li class="breadcrumb-item">
                    <a th:href="@{/categories/{id}/products(id=${product.category.id})}" th:text="${product.category.name}">Category</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Product</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-md-6">
                <div class="bg-light p-5 rounded text-center" style="height: 300px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-image text-secondary" style="font-size: 5rem;"></i>
                </div>
            </div>
            <div class="col-md-6">
                <h2 th:text="${product.name}">Product Name</h2>
                <p class="text-muted" th:text="'Category: ' + ${product.category.name}">Category</p>
                <h3 class="text-primary mb-4" th:text="'$' + ${product.price}">$0.00</h3>
                <p class="lead" th:text="${product.description}">Description</p>
                
                <div class="mt-4">
                    <p th:if="${product.stockQuantity > 0}" class="text-success">
                        <i class="bi bi-check-circle-fill"></i> In Stock (<span th:text="${product.stockQuantity}"></span> available)
                    </p>
                    <p th:if="${product.stockQuantity <= 0}" class="text-danger">
                        <i class="bi bi-x-circle-fill"></i> Out of Stock
                    </p>

                    <form th:action="@{/cart/add}" method="post" class="row g-3" th:if="${product.stockQuantity > 0}">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <div class="col-auto">
                            <label for="quantity" class="visually-hidden">Quantity</label>
                            <input type="number" name="quantity" id="quantity" class="form-control" value="1" min="1" th:max="${product.stockQuantity}">
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
