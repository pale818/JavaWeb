<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Categories</h2>
        <a th:href="@{/admin/categories/new}" class="btn btn-primary">+ New Category</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.name}"></td>
            <td th:text="${cat.description}"></td>
            <td>
                <a th:href="@{/admin/categories/{id}/edit(id=${cat.id})}" class="btn btn-sm btn-outline-secondary">Edit</a>
                <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('Delete this category?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/admin/products}" class="btn btn-outline-primary">Manage Products</a>
        <a th:href="@{/admin/login-history}" class="btn btn-outline-secondary ms-2">Login History</a>
        <a th:href="@{/admin/orders}" class="btn btn-outline-secondary ms-2">All Orders</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
