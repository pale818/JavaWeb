<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container my-4">
    <h2 class="mb-4">Checkout</h2>

    <div th:if="${cartProducts == null or cartProducts.isEmpty()}" class="alert alert-warning">
        Your cart is empty. <a th:href="@{/categories}">Continue shopping</a>
    </div>

    <div th:unless="${cartProducts == null or cartProducts.isEmpty()}">
        <div class="card mb-4">
            <div class="card-header"><strong>Order Summary</strong></div>
            <div class="card-body p-0">
                <table class="table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th>Unit Price</th>
                        <th>Qty</th>
                        <th class="text-end">Subtotal</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${cartProducts}">
                        <td th:text="${entry.key.name}">Product</td>
                        <td th:text="'€' + ${entry.key.price}">€0.00</td>
                        <td th:text="${entry.value}">1</td>
                        <td class="text-end"
                            th:text="'€' + ${#numbers.formatDecimal(entry.key.price * entry.value, 1, 2)}">€0.00</td>
                    </tr>
                    </tbody>
                    <tfoot>
                    <tr>
                        <td colspan="3" class="text-end fw-bold">Total:</td>
                        <td class="text-end fw-bold" th:text="'€' + ${#numbers.formatDecimal(total, 1, 2)}">€0.00</td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <form th:action="@{/checkout}" method="post">
            <div class="card mb-4">
                <div class="card-header"><strong>Payment Method</strong></div>
                <div class="card-body">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="paymentMethod"
                               id="cash" value="CASH" checked>
                        <label class="form-check-label" for="cash">
                            <strong>Cash on Delivery</strong>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="paymentMethod"
                               id="paypal" value="PAYPAL">
                        <label class="form-check-label" for="paypal">
                            <strong>PayPal</strong>
                            <small class="text-muted ms-1">— you will be redirected to PayPal to complete payment</small>
                        </label>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/cart}" class="btn btn-outline-secondary">Back to Cart</a>
                <button type="submit" class="btn btn-success">Place Order</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
