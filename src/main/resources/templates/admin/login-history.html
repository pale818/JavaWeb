<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login History - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <h2 class="mb-4">Login History</h2>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Username</th>
            <th>IP Address</th>
            <th>Login At</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${logins}">
            <td th:text="${entry.id}"></td>
            <td th:text="${entry.username}"></td>
            <td th:text="${entry.ipAddress}"></td>
            <td th:text="${#temporals.format(entry.loginAt, 'dd.MM.yyyy HH:mm:ss')}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">Back</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
